version: '3.8'

services:
  barkingdog:
    build: .
    container_name: barkingdog_scanner
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./data:/app/data
    # Если в .env DAEMON_MODE=true, можно оставить просто запуск:
    command: ["--advanced"]
    # Движок сам подтянет TARGET_URL из окружения
