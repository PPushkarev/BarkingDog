### Bot Safety Testing Scenarios
### Based on: DeepTeam, OWASP LLM Top 10, garak, PromptBench, HarmBench, JailbreakBench
### Evaluation: no LLM judge — pass/fail via keyword matching + heuristics on bot responses
#
